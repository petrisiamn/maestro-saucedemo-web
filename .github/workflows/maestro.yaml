name: Run Maestro web tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  web-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-liberation libappindicator3-1 libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libgdk-pixbuf2.0-0 libnspr4 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils libgbm-dev

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: "stable"

      - name: Setup Chrome Wrapper
        run: |
          # Find the actual chrome binary path
          CHROME_PATH=$(which google-chrome || echo "/usr/bin/google-chrome")
          echo "Found chrome at $CHROME_PATH"

          # Create a wrapper to ensure flags are passed
          if [ -L "$CHROME_PATH" ] || [ -f "$CHROME_PATH" ]; then
            # If it's a symlink, we need the real path for the original
            REAL_CHROME=$(readlink -f "$CHROME_PATH")
            sudo mv "$CHROME_PATH" "${CHROME_PATH}-original"
            echo '#!/bin/bash' | sudo tee "$CHROME_PATH"
            echo "exec \"${CHROME_PATH}-original\" --no-sandbox --disable-dev-shm-usage \"\$@\"" | sudo tee -a "$CHROME_PATH"
            sudo chmod +x "$CHROME_PATH"
            echo "Wrapper created at $CHROME_PATH pointing to ${CHROME_PATH}-original"
          else
            echo "Chrome not found at $CHROME_PATH, creating wrapper anyway"
            echo '#!/bin/bash' | sudo tee "$CHROME_PATH"
            echo 'exec google-chrome-stable --no-sandbox --disable-dev-shm-usage "$@"' | sudo tee -a "$CHROME_PATH"
            sudo chmod +x "$CHROME_PATH"
          fi

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro Tests
        run: xvfb-run maestro test web-flow.yaml
